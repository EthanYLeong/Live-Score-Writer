<!DOCTYPE html>
<html>
<head>
    <title>Sheet Music Canvas</title>
<script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.7/build/opensheetmusicdisplay.min.js"></script>

<style>
    body {
        margin: 0;
        padding: 10px;
        background-color: white;
    } 
    #music-container {
        width: 100%;
    }
</style>

</head>
<body>

<div id="music-container"></div>

<script>
    const osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("music-container");
    function renderMusicXmlFromJava(musicXmlString){
        osmd.load(musicXmlString)
        .then(function() {
            osmd.render();
        })
        .catch(function(error) {
            console.error("Error rendering MusicXML: ", error);
        });
    }
</script>


</body>
</html>
